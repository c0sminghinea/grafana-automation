name: Grafana SM UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      random_seed:
        description: "Random seed for reproducible runs"
        required: false
        type: number

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run tests
        run: >
          pytest
          --base-url ${{ vars.GRAFANA_URL || 'https://play.grafana.org' }}
          ${{ inputs.random_seed && format('--random-seed {0}', inputs.random_seed) || '' }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-artifacts
          path: |
            traces/
          retention-days: 14

  report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.30.0/allure-2.30.0.tgz
          tar -xzf allure-2.30.0.tgz
          echo "$PWD/allure-2.30.0/bin" >> $GITHUB_PATH

      - name: Fetch gh-pages history
        run: |
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          if git show gh-pages:history 2>/dev/null; then
            git checkout gh-pages -- history
            mv history allure-results/history
          fi

      - name: Generate Allure report
        run: allure generate allure-results -o allure-report --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
