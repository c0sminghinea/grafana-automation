[pytest]
base_url = https://play.grafana.org
testpaths = tests
pythonpath = .
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
addopts = --alluredir=allure-results --clean-alluredir -v --tb=short
xfail_strict = true
markers =
    tc001: TC-001 Probe filter produces expected number of results
    tc002: TC-002 Correct check detail page opens when clicking View Dashboard
    tc003: TC-003 Probe with zero assigned checks produces empty list
